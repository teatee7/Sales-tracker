<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0a0a0a;
–surface: #141414;
–border: #222;
–approach: #f5c542;
–stop: #4ecdc4;
–story: #a78bfa;
–close: #f87171;
–text: #f0f0f0;
–muted: #555;
}

:root.light {
–bg: #f5f4f0;
–surface: #ffffff;
–border: #ddd;
–text: #111;
–muted: #aaa;
}

/* dark mode toggle button */
.theme-toggle {
position: absolute;
top: 0;
right: 0;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 18px;
width: 38px;
height: 38px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: border-color 0.2s, color 0.2s;
}
.theme-toggle:hover { border-color: #555; color: var(–text); }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 40px 20px 60px;
position: relative;
overflow-x: hidden;
}

body::before {
content: ‘’;
position: fixed;
inset: 0;
background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245,197,66,0.07), transparent),
radial-gradient(ellipse 60% 40% at 80% 100%, rgba(167,139,250,0.06), transparent);
pointer-events: none;
z-index: 0;
}

.container { position: relative; z-index: 1; width: 100%; max-width: 640px; }

header {
text-align: center;
margin-bottom: 48px;
position: relative;
}

h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(52px, 12vw, 88px);
letter-spacing: 4px;
line-height: 1;
background: linear-gradient(135deg, #fff 30%, var(–approach) 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.subtitle {
color: var(–muted);
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
margin-top: 8px;
}

/* BUTTONS GRID */
.actions {
display: grid;
grid-template-columns: 1fr 1fr 1fr 1fr;
gap: 12px;
margin-bottom: 40px;
}

.btn-wrap {
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
}

.btn-label {
font-size: 9px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–muted);
text-align: center;
}

.action-btn {
width: 100%;
aspect-ratio: 1;
border: none;
border-radius: 16px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(28px, 7vw, 48px);
letter-spacing: 1px;
cursor: pointer;
position: relative;
transition: transform 0.1s ease, box-shadow 0.2s ease;
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
overflow: hidden;
-webkit-tap-highlight-color: transparent;
}

.action-btn::after {
content: ‘’;
position: absolute;
inset: 0;
border-radius: inherit;
background: white;
opacity: 0;
transition: opacity 0.15s;
}

.action-btn:active::after { opacity: 0.08; }
.action-btn:active { transform: scale(0.94); }

.action-btn .count {
font-size: clamp(32px, 9vw, 54px);
line-height: 1;
}

.action-btn .icon {
font-size: clamp(14px, 4vw, 20px);
line-height: 1;
opacity: 0.8;
}

.btn-approach { background: var(–approach); color: #1a1200; box-shadow: 0 8px 32px rgba(245,197,66,0.25); }
.btn-stop     { background: var(–stop);     color: #001a19; box-shadow: 0 8px 32px rgba(78,205,196,0.25); }
.btn-story    { background: var(–story);    color: #110a2a; box-shadow: 0 8px 32px rgba(167,139,250,0.25); }
.btn-close    { background: var(–close);    color: #1a0505; box-shadow: 0 8px 32px rgba(248,113,113,0.25); }

/* STATS */
.stats-grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 12px;
margin-bottom: 32px;
}

.stat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 18px 14px;
text-align: center;
position: relative;
overflow: hidden;
transition: border-color 0.3s;
}

.stat-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
}

.stat-card.card-a::before { background: var(–approach); }
.stat-card.card-s::before { background: var(–stop); }
.stat-card.card-c::before { background: var(–close); }

.stat-pct {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 38px;
letter-spacing: 1px;
line-height: 1;
transition: color 0.4s;
}

.stat-card.card-a .stat-pct { color: var(–approach); }
.stat-card.card-s .stat-pct { color: var(–stop); }
.stat-card.card-c .stat-pct { color: var(–close); }

.stat-label {
font-size: 8px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–muted);
margin-top: 4px;
line-height: 1.4;
}

/* PROGRESS BARS */
.pipeline {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 24px;
margin-bottom: 24px;
}

.pipeline-title {
font-size: 9px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 20px;
}

.pipeline-row {
margin-bottom: 16px;
}

.pipeline-row:last-child { margin-bottom: 0; }

.pipeline-meta {
display: flex;
justify-content: space-between;
align-items: baseline;
margin-bottom: 7px;
}

.pipeline-name {
font-size: 10px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: #888;
}

.pipeline-val {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 18px;
}

.bar-track {
height: 6px;
background: #1e1e1e;
border-radius: 99px;
overflow: hidden;
}

.bar-fill {
height: 100%;
border-radius: 99px;
transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
width: 0%;
}

.bar-a { background: linear-gradient(90deg, #c89a1c, var(–approach)); }
.bar-s { background: linear-gradient(90deg, #2a9e96, var(–stop)); }
.bar-p { background: linear-gradient(90deg, #7c5fd1, var(–story)); }
.bar-c { background: linear-gradient(90deg, #c94444, var(–close)); }

/* TOTALS ROW */
.totals {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
margin-bottom: 24px;
}

.total-chip {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 8px;
text-align: center;
}

.total-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
line-height: 1;
}

.total-chip:nth-child(1) .total-num { color: var(–approach); }
.total-chip:nth-child(2) .total-num { color: var(–stop); }
.total-chip:nth-child(3) .total-num { color: var(–story); }
.total-chip:nth-child(4) .total-num { color: var(–close); }

.total-lbl {
font-size: 8px;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–muted);
margin-top: 2px;
}

/* RESET */
.reset-btn {
width: 100%;
padding: 14px;
background: transparent;
border: 1px solid #2a2a2a;
border-radius: 10px;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
cursor: pointer;
transition: border-color 0.2s, color 0.2s;
}

.reset-btn:hover { border-color: #444; color: #999; }

/* PULSE ANIMATION */
@keyframes pulse-ring {
0% { transform: scale(1); opacity: 0.6; }
100% { transform: scale(1.6); opacity: 0; }
}

.pulse {
animation: pop 0.08s ease;
}

@keyframes pop {
0% { transform: scale(1); }
50% { transform: scale(0.92); }
100% { transform: scale(1); }
}

@media (max-width: 420px) {
.actions { gap: 8px; }
.stats-grid { gap: 8px; }
.stat-pct { font-size: 30px; }
}
</style>

</head>

<script>
  // All functions defined first so nothing is called before they exist

  const saved = JSON.parse(localStorage.getItem('closer-state') || 'null');
  const state = saved ? saved.state : { approach: 0, stop: 0, story: 0, close: 0 };
  const history = saved ? saved.history : [];

  function save() {
    localStorage.setItem('closer-state', JSON.stringify({ state: state, history: history }));
  }

  function pct(num, denom) {
    if (!denom) return '—';
    return Math.round((num / denom) * 100) + '%';
  }

  function update() {
    var approach = state.approach, stop = state.stop, story = state.story, close = state.close;
    document.getElementById('pct-stop').textContent  = approach ? pct(stop, approach) : '—';
    document.getElementById('pct-story').textContent = stop    ? pct(story, stop)    : '—';
    document.getElementById('pct-close').textContent = story   ? pct(close, story)   : '—';
    document.getElementById('num-approach').textContent = approach;
    document.getElementById('num-stop').textContent     = stop;
    document.getElementById('num-story').textContent    = story;
    document.getElementById('num-close').textContent    = close;
    var base = approach || 1;
    document.getElementById('bar-a').style.width = '100%';
    document.getElementById('bar-s').style.width = Math.min(100, (stop  / base) * 100) + '%';
    document.getElementById('bar-p').style.width = Math.min(100, (story / base) * 100) + '%';
    document.getElementById('bar-c').style.width = Math.min(100, (close / base) * 100) + '%';
  }

  function track(type, btn) {
    history.push(type);
    state[type]++;
    document.getElementById('btn-' + type).textContent = state[type];
    btn.classList.remove('pulse');
    void btn.offsetWidth;
    btn.classList.add('pulse');
    setTimeout(function() { btn.classList.remove('pulse'); }, 80);
    update();
    save();
  }

  function undoLast() {
    if (!history.length) return;
    var last = history.pop();
    if (state[last] > 0) {
      state[last]--;
      document.getElementById('btn-' + last).textContent = state[last];
    }
    update();
    save();
  }

  function resetAll() {
    document.getElementById('confirm-modal').style.display = 'flex';
  }

  function confirmReset(yes) {
    document.getElementById('confirm-modal').style.display = 'none';
    if (!yes) return;
    state.approach = state.stop = state.story = state.close = 0;
    history.length = 0;
    ['approach','stop','story','close'].forEach(function(t) {
      document.getElementById('btn-' + t).textContent = 0;
    });
    update();
    save();
  }

  function toggleTheme() {
    var isLight = document.documentElement.classList.toggle('light');
    document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem('closer-theme', isLight ? 'light' : 'dark');
  }

  // Init on load
  window.addEventListener('DOMContentLoaded', function() {
    // Restore theme
    if (localStorage.getItem('closer-theme') === 'light') {
      document.documentElement.classList.add('light');
      document.getElementById('theme-btn').textContent = '☀️';
    }
    // Restore counts
    ['approach','stop','story','close'].forEach(function(t) {
      document.getElementById('btn-' + t).textContent = state[t];
    });
    update();
  });
</script>

<!-- Reset confirm modal -->

<div id="confirm-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;text-align:center;max-width:280px;width:90%;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:10px;color:var(--text)">RESET SESSION?</div>
    <div style="font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:24px;">All counts will be cleared.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button onclick="confirmReset(false)" style="padding:12px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;">Cancel</button>
      <button onclick="confirmReset(true)" style="padding:12px;background:#f87171;border:none;border-radius:8px;color:#1a0505;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-weight:500;">Reset</button>
    </div>
  </div>
</div>
